<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/launchericon-96x96.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SAMTECHKE Security Systems | Electric Fence, CCTV & Alarm Installation Kenya</title>
    <meta name="description" content="Professional security systems installation in Kenya. Electric fence, CCTV cameras, alarm systems, and fence repair services. Protect your property with SAMTECHKE." />
    <meta name="keywords" content="electric fence installation Kenya, CCTV installation Kenya, alarm systems Kenya, security systems Nairobi, SAMTECHKE" />
    <meta name="author" content="SAMTECHKE Security Systems" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FFD000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SAMTECHKE" />
    <link rel="apple-touch-icon" href="/images/launchericon-192x192.png" />
    
    <!-- Splash Screen Styles -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      .splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #ffffff 0%, #fff8e0 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      .splash-logo {
        width: 120px;
        height: 120px;
        animation: bounce 1s ease-in-out infinite;
      }
      
      .splash-logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      
      .splash-title {
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 28px;
        font-weight: bold;
        margin-top: 20px;
        color: #1a1a1a;
      }
      
      .splash-title span {
        color: #FFD000;
      }
      
      .splash-subtitle {
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 14px;
        color: #666;
        margin-top: 8px;
      }
      
      .splash-loader {
        margin-top: 40px;
        width: 40px;
        height: 40px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #FFD000;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .splash-powered {
        position: absolute;
        bottom: 30px;
        font-size: 11px;
        color: #aaa;
        font-family: system-ui, sans-serif;
      }
      
      /* Hide splash when content loads */
      .splash-hidden {
        opacity: 0;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen with Original Logo -->
    <div id="splash" class="splash-screen">
      <div class="splash-logo">
        <img src="/images/file_00000000ac1471f5b6bc76d30b671d9d.png" alt="SAMTECHKE Logo" />
      </div>
      <div class="splash-title">
        SAMTECH<span>KE</span>
      </div>
      <div class="splash-subtitle">
        Security Systems
      </div>
      <div class="splash-loader"></div>
      <div class="splash-powered">
        Protecting Kenya since 2020
      </div>
    </div>

    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Hide splash screen when app loads
      window.addEventListener('load', function() {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('splash-hidden');
          setTimeout(() => {
            splash.style.display = 'none';
          }, 500);
        }
      });
      
      // Register Service Workers
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Register PWA Service Worker
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA Service Worker registered:', reg))
            .catch(err => console.log('PWA Service Worker error:', err));
        });
      }
    </script>
  </body>
</html>
